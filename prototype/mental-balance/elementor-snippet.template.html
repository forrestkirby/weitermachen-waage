<!-- Paste into an Elementor HTML widget -->
<!-- MBS: root wrapper -->
<section id="mbs-root" class="mbs-app" data-mbs-ready="false">
  <div class="mbs-header">
    <h2 class="mbs-title">Mentale Waage</h2>
    <p class="mbs-help">Füge bis zu 10 Elemente hinzu und verschiebe sie zwischen links und rechts.</p>
  </div>

  <form class="mbs-add-form" novalidate>
    <label class="mbs-label">
      <span class="mbs-label-text">Bezeichnung</span>
      <input
        class="mbs-input-name"
        name="itemName"
        type="text"
        maxlength="40"
        placeholder="z. B. Prüfungsangst"
        required
      />
    </label>
    <label class="mbs-label">
      <span class="mbs-label-text">Gewicht (1–10)</span>
      <input class="mbs-input-weight" name="itemWeight" type="number" min="1" max="10" step="1" value="5" required />
    </label>
    <button class="mbs-add-btn" type="submit">Element hinzufügen</button>
  </form>

  <div class="mbs-scale-area">
    <div class="mbs-scale-visual">
      <img class="mbs-scale-image" alt="" />
      <div class="mbs-beam-wrap" aria-hidden="true">
        <div class="mbs-beam-bar"></div>
      </div>
    </div>
    <div class="mbs-pans-row">
      <div class="mbs-pan mbs-dropzone mbs-left-pan" data-zone="left" aria-label="Linke Waagschale">
        <div class="mbs-pan-title-wrap">
          <span
            class="mbs-pan-title"
            data-mbs-pan-title="left"
            contenteditable="true"
            role="textbox"
            aria-multiline="false"
            aria-label="Titel der linken Seite"
            data-placeholder="Tippen zum Benennen"
          ></span>
          <span class="mbs-pan-title-pencil" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </span>
        </div>
        <div class="mbs-pan-total" aria-live="polite">
          <span class="mbs-pan-total-label">Gesamt</span>
          <span class="mbs-pan-total-value" data-mbs-pan-total="left">0</span>
        </div>
      </div>
      <div class="mbs-pan mbs-dropzone mbs-right-pan" data-zone="right" aria-label="Rechte Waagschale">
        <div class="mbs-pan-title-wrap">
          <span
            class="mbs-pan-title"
            data-mbs-pan-title="right"
            contenteditable="true"
            role="textbox"
            aria-multiline="false"
            aria-label="Titel der rechten Seite"
            data-placeholder="Tippen zum Benennen"
          ></span>
          <span class="mbs-pan-title-pencil" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 20h9" />
              <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
            </svg>
          </span>
        </div>
        <div class="mbs-pan-total" aria-live="polite">
          <span class="mbs-pan-total-label">Gesamt</span>
          <span class="mbs-pan-total-value" data-mbs-pan-total="right">0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="mbs-depot-area" hidden>
    <h3 class="mbs-zone-title">Ablage</h3>
    <div class="mbs-dropzone mbs-depot" data-zone="depot" aria-label="Ablage"></div>
  </div>

  <div class="mbs-actions">
    <button class="mbs-clear-btn" type="button">Alles löschen</button>
  </div>

  <p class="mbs-status" role="status" aria-live="polite"></p>
  <div class="mbs-drag-ghost" aria-hidden="true"></div>
</section>

<!-- MBS: config -->

{
  "maxItems": 10,
  "maxNameChars": 40,

    "itemWeight": "Gewicht (1–10)",

    "depotTitle": "Ablage",
    "clearAll": "Alles löschen",
    "leftPan": "Linke Waagschale",
    "rightPan": "Rechte Waagschale",

    "moveLeft": "Nach links",
    "moveRight": "Nach rechts",

    "leftTitle": "",

    "errorMaxItems": "Du kannst höchstens {maxItems} Elemente hinzufügen.",
    "errorNameRequired": "Bitte gib eine Bezeichnung ein.",
    "errorNameTooLong": "Die Bezeichnung darf höchstens {maxNameChars} Zeichen haben.",

    "statusCleared": "Alle Elemente wurden entfernt.",
    "zoneLeft": "linke Waagschale",
    "zoneRight": "rechte Waagschale",
    "zoneDepot": "Ablage"
  }
}
</script>

<!-- MBS: styles -->
<style id="mbs-styles">
  .mbs-app {
    --mbs-bg: #f8faff;
    --mbs-border: #c8d7ff;
    --mbs-accent: #3259c7;
    --mbs-card: #ffffff;
    --mbs-text: #1e293b;
    --mbs-muted: #475569;
    --mbs-danger: #b91c1c;
    background: var(--mbs-bg);
    border: 1px solid var(--mbs-border);
    border-radius: 12px;
    color: var(--mbs-text);
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    margin: 0 auto;
    max-width: 980px;
    padding: 16px;
  }

  .mbs-title {
    margin: 0 0 4px;
  }

  .mbs-help {
    color: var(--mbs-muted);
    margin: 0 0 14px;
  }

  .mbs-add-form {
    align-items: end;
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 140px auto;
    margin-bottom: 14px;
  }

  .mbs-label {
    display: grid;
    gap: 4px;
  }

  .mbs-label-text {
    color: var(--mbs-muted);
    font-size: 0.92rem;
  }

  .mbs-input-name,
  .mbs-input-weight {
    border: 1px solid #b8c6ea;
    border-radius: 8px;
    font-size: 1rem;
    min-height: 40px;
    padding: 8px 10px;
    width: 100%;
  }

  .mbs-add-btn,
  .mbs-clear-btn,
  .mbs-chip-actions button {
    background: var(--mbs-accent);
    border: 0;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 0.94rem;
    min-height: 40px;
    padding: 8px 14px;
  }

  .mbs-clear-btn {
    background: #334155;
  }

  .mbs-scale-area {
    border: 1px solid var(--mbs-border);
    border-radius: 10px;
    margin: 14px 0;
    padding: 16px;
  }

  .mbs-scale-visual {
    margin-bottom: 12px;
    min-height: 140px;
    position: relative;
  }

  .mbs-scale-image {
    display: block;
    height: 130px;
    margin: 0 auto;
    max-width: 100%;
    object-fit: contain;
  }

  .mbs-scale-image:not([src]),
  .mbs-scale-image[src=""] {
    display: none;
  }

  .mbs-beam-wrap {
    left: 50%;
    max-width: 72%;
    pointer-events: none;
    position: absolute;
    top: 72px;
    transform: translateX(-50%);
    width: 100%;
  }

  .mbs-beam-bar {
    background: #4a5a78;
    border-radius: 2px;
    height: 4px;
    transform-origin: 50% 0;
    transition: transform 280ms ease;
    width: 100%;
  }

  .mbs-pans-row {
    display: grid;
    gap: 16px;
    grid-template-columns: 1fr 1fr;
  }

  .mbs-pan {
    background: #edf3ff;
    border: 2px dashed #8aa4e6;
    border-radius: 12px;
    min-height: 120px;
    padding: 8px;
    transition: background 180ms ease;
  }

  .mbs-pan-title-wrap {
    align-items: flex-start;
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .mbs-pan-title-wrap:hover .mbs-pan-title-pencil,
  .mbs-pan-title-wrap:focus-within .mbs-pan-title-pencil {
    color: var(--mbs-accent);
  }

  .mbs-pan-title {
    border-radius: 6px;
    cursor: text;
    flex: 1;
    font-size: 1.05rem;
    font-weight: 700;
    line-height: 1.3;
    min-height: 1.5em;
    min-width: 4rem;
    outline: none;
    overflow-wrap: anywhere;
    padding: 2px 4px;
  }

  .mbs-pan-title:empty::before {
    color: var(--mbs-muted);
    content: attr(data-placeholder);
    font-weight: 400;
    pointer-events: none;
  }

  .mbs-pan-title:hover,
  .mbs-pan-title:focus {
    background: rgba(255, 255, 255, 0.55);
    box-shadow: inset 0 -1px 0 0 rgba(50, 89, 199, 0.35);
  }

  .mbs-pan-title-pencil {
    color: var(--mbs-muted);
    cursor: pointer;
    flex-shrink: 0;
    line-height: 0;
    margin-top: 4px;
    padding: 2px;
  }

  .mbs-pan-total {
    align-items: center;
    background: #c7d9ff;
    border: 2px solid #8aa4e6;
    border-radius: 999px;
    display: flex;
    font-size: 0.95rem;
    font-weight: 700;
    gap: 8px;
    justify-content: center;
    margin-bottom: 10px;
    padding: 6px 14px;
  }

  .mbs-pan-total-label {
    color: var(--mbs-muted);
    font-size: 0.82rem;
    font-weight: 600;
  }

  .mbs-pan-total-value {
    font-size: 1.05rem;
  }

  .mbs-dropzone.mbs-over {
    background: #dbe7ff;
  }

  .mbs-zone-title {
    margin: 0 0 8px;
  }

  .mbs-depot-area {
    margin-bottom: 14px;
  }

  .mbs-depot {
    background: #f3f4f6;
    border: 2px dashed #9ca3af;
    border-radius: 12px;
    min-height: 110px;
    padding: 8px;
  }

  .mbs-chip {
    background: var(--mbs-card);
    border: 1px solid #b5c7f7;
    border-radius: 10px;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.1);
    cursor: grab;
    margin-bottom: 8px;
    padding: 8px;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }

  .mbs-chip:last-child {
    margin-bottom: 0;
  }

  .mbs-chip.dragging {
    opacity: 0.55;
  }

  .mbs-chip-header {
    align-items: center;
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin-bottom: 6px;
  }

  .mbs-chip-name {
    font-weight: 600;
    overflow-wrap: anywhere;
  }

  .mbs-chip-weight {
    background: #dbe7ff;
    border-radius: 999px;
    font-size: 0.85rem;
    padding: 2px 8px;
    white-space: nowrap;
  }

  .mbs-chip-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .mbs-chip-actions button {
    background: #4f46e5;
    font-size: 0.8rem;
    min-height: 30px;
    padding: 5px 8px;
  }

  .mbs-chip-actions button:disabled {
    cursor: default;
    opacity: 0.45;
  }

  .mbs-chip-actions [data-move-zone="depot"][hidden] {
    display: none;
  }

  .mbs-actions {
    align-items: center;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: space-between;
  }

  .mbs-status {
    color: var(--mbs-muted);
    margin: 10px 0 0;
    min-height: 1.3em;
  }

  .mbs-status.mbs-error {
    color: var(--mbs-danger);
  }

  .mbs-drag-ghost {
    background: #1e293b;
    border-radius: 8px;
    color: #fff;
    display: none;
    font-size: 0.8rem;
    left: 0;
    padding: 4px 8px;
    pointer-events: none;
    position: fixed;
    top: 0;
    transform: translate(10px, 10px);
    z-index: 9999;
  }

  @media (prefers-reduced-motion: reduce) {
    .mbs-beam-bar {
      transition: none;
    }
  }

  @media (max-width: 900px) {
    .mbs-add-form {
      grid-template-columns: 1fr 120px;
    }

    .mbs-add-btn {
      grid-column: 1 / -1;
    }
  }

  @media (max-width: 700px) {
    .mbs-chip-header {
      align-items: flex-start;
      flex-direction: column;
      gap: 4px;
    }

    .mbs-chip-name {
      width: 100%;
      word-break: break-word;
    }

    .mbs-pan {
      min-height: 100px;
    }

    .mbs-pan-title {
      font-size: 1rem;
    }
  }
</style>

<!-- MBS: runtime -->
<script id="mbs-runtime">
  (function () {
    var root = document.getElementById("mbs-root");
    if (!root || root.dataset.mbsReady === "true") {
      return;
    }
    root.dataset.mbsReady = "true";

    var form = root.querySelector(".mbs-add-form");
    var nameInput = root.querySelector(".mbs-input-name");
    var weightInput = root.querySelector(".mbs-input-weight");
    var clearBtn = root.querySelector(".mbs-clear-btn");
    var leftZone = root.querySelector(".mbs-left-pan");
    var rightZone = root.querySelector(".mbs-right-pan");
    var depotZone = root.querySelector(".mbs-depot");
    var depotArea = root.querySelector(".mbs-depot-area");
    var beamBar = root.querySelector(".mbs-beam-bar");
    var statusEl = root.querySelector(".mbs-status");
    var panTotalLeftEl = root.querySelector('[data-mbs-pan-total="left"]');
    var panTotalRightEl = root.querySelector('[data-mbs-pan-total="right"]');
    var panTitleLeftEl = root.querySelector('[data-mbs-pan-title="left"]');
    var panTitleRightEl = root.querySelector('[data-mbs-pan-title="right"]');
    var dragGhost = root.querySelector(".mbs-drag-ghost");
    var scaleImage = root.querySelector(".mbs-scale-image");
    var configEl = document.getElementById("mbs-config");

    var fallbackConfig = {
      maxItems: 10,
      maxNameChars: 40,
      maxTitleChars: 30,
      minWeight: 1,
      maxWeight: 10,
      maxTiltDeg: 18,
      tiltFactor: 1.8,
      persistSession: false,
      showDepot: false,
      labels: {}
    };

    var config = fallbackConfig;
    try {
      config = Object.assign({}, fallbackConfig, JSON.parse(configEl.textContent || "{}"));
    } catch (err) {
      config = fallbackConfig;
    }

    if (config.showDepot === undefined) {
      config.showDepot = false;
    }

    var labels = Object.assign(
      {
        title: "Mentale Waage",
        help: "",
        itemName: "Bezeichnung",
        itemNamePlaceholder: "",
        itemWeight: "Gewicht",
        addButton: "Element hinzufügen",
        depotTitle: "Ablage",
        clearAll: "Alles löschen",
        leftPan: "Linke Waagschale",
        rightPan: "Rechte Waagschale",
        depot: "Ablage",
        moveLeft: "Nach links",
        moveRight: "Nach rechts",
        moveDepot: "In Ablage",
        totalWeightLabel: "Gesamt",
        titlePlaceholder: "Tippen zum Benennen",
        titleLeftAria: "Titel der linken Seite",
        titleRightAria: "Titel der rechten Seite",
        leftTitle: "",
        rightTitle: "",
        errorMaxItems: "Du kannst höchstens {maxItems} Elemente hinzufügen.",
        errorNameRequired: "Bitte gib eine Bezeichnung ein.",
        errorNameTooLong: "Die Bezeichnung darf höchstens {maxNameChars} Zeichen haben.",
        errorWeightRange: "Das Gewicht muss zwischen {minWeight} und {maxWeight} liegen.",
        statusAdded: "„{name}“ mit Gewicht {weight} hinzugefügt.",
        statusMoved: "„{name}“ nach {zoneLabel} verschoben.",
        statusCleared: "Alle Elemente wurden entfernt.",
        zoneLeft: "linke Waagschale",
        zoneRight: "rechte Waagschale",
        zoneDepot: "Ablage"
      },
      config.labels || {}
    );

    var state = {
      items: [],
      titles: { left: "", right: "" },
      draggingId: null,
      pointerDragId: null,
      pointerActive: false,
      pointerStartX: 0,
      pointerStartY: 0
    };

    var zoneByName = {
      left: leftZone,
      right: rightZone,
      depot: depotZone
    };

    var dropZones = [leftZone, rightZone];
    if (config.showDepot) {
      dropZones.push(depotZone);
    }

    var prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    applyConfigToUi();
    hydrateFromSession();
    applyPanTitlesToDom();
    wirePanTitles();
    render();

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      addItem();
    });

    clearBtn.addEventListener("click", function () {
      state.items = [];
      persist();
      render();
      announce(labels.statusCleared, false);
    });

    dropZones.forEach(function (zoneEl) {
      zoneEl.addEventListener("dragover", function (event) {
        event.preventDefault();
      });
      zoneEl.addEventListener("dragenter", function () {
        zoneEl.classList.add("mbs-over");
      });
      zoneEl.addEventListener("dragleave", function () {
        zoneEl.classList.remove("mbs-over");
      });
      zoneEl.addEventListener("drop", function (event) {
        event.preventDefault();
        zoneEl.classList.remove("mbs-over");
        if (!state.draggingId) {
          return;
        }
        moveItem(state.draggingId, zoneEl.dataset.zone);
      });
    });

    if (config.showDepot && depotZone) {
      depotZone.addEventListener("dragover", function (event) {
        event.preventDefault();
      });
      depotZone.addEventListener("dragenter", function () {
        depotZone.classList.add("mbs-over");
      });
      depotZone.addEventListener("dragleave", function () {
        depotZone.classList.remove("mbs-over");
      });
      depotZone.addEventListener("drop", function (event) {
        event.preventDefault();
        depotZone.classList.remove("mbs-over");
        if (!state.draggingId) {
          return;
        }
        moveItem(state.draggingId, depotZone.dataset.zone);
      });
    }

    root.addEventListener("pointermove", function (event) {
      if (!state.pointerDragId) {
        return;
      }
      if (!state.pointerActive) {
        var dx = event.clientX - state.pointerStartX;
        var dy = event.clientY - state.pointerStartY;
        if (dx * dx + dy * dy < 36) {
          return;
        }
        state.pointerActive = true;
        var dragItem = state.items.find(function (entry) {
          return entry.id === state.pointerDragId;
        });
        dragGhost.textContent = dragItem ? dragItem.name + " (" + dragItem.weight + ")" : "";
        dragGhost.style.display = "block";
      }
      event.preventDefault();
      dragGhost.style.left = event.clientX + "px";
      dragGhost.style.top = event.clientY + "px";
      highlightDropzoneAt(event.clientX, event.clientY);
    });

    function endPointerDrag(commit, event) {
      if (!state.pointerDragId) {
        return;
      }
      if (commit && state.pointerActive) {
        var targetZone = detectZoneAt(event.clientX, event.clientY);
        if (targetZone) {
          moveItem(state.pointerDragId, targetZone.dataset.zone);
        }
      }
      state.pointerDragId = null;
      state.pointerActive = false;
      clearDropzoneHighlights();
      dragGhost.style.display = "none";
    }

    root.addEventListener("pointerup", function (event) {
      endPointerDrag(true, event);
    });

    root.addEventListener("pointercancel", function (event) {
      endPointerDrag(false, event);
    });

    function applyConfigToUi() {
      root.querySelector(".mbs-title").textContent = labels.title;
      root.querySelector(".mbs-help").textContent = labels.help;
      root.querySelector(".mbs-label:first-of-type .mbs-label-text").textContent = labels.itemName;
      root.querySelector(".mbs-label:last-of-type .mbs-label-text").textContent = labels.itemWeight;
      root.querySelector(".mbs-add-btn").textContent = labels.addButton;
      root.querySelector(".mbs-zone-title").textContent = labels.depotTitle;
      root.querySelector(".mbs-clear-btn").textContent = labels.clearAll;

      leftZone.setAttribute("aria-label", labels.leftPan);
      rightZone.setAttribute("aria-label", labels.rightPan);
      depotZone.setAttribute("aria-label", labels.depot);

      root.querySelectorAll(".mbs-pan-total-label").forEach(function (el) {
        el.textContent = labels.totalWeightLabel;
      });

      state.titles.left = clampTitle(String(labels.leftTitle || ""));
      state.titles.right = clampTitle(String(labels.rightTitle || ""));

      [panTitleLeftEl, panTitleRightEl].forEach(function (el) {
        el.setAttribute("data-placeholder", labels.titlePlaceholder);
      });
      panTitleLeftEl.setAttribute("aria-label", labels.titleLeftAria);
      panTitleRightEl.setAttribute("aria-label", labels.titleRightAria);

      depotArea.hidden = !config.showDepot;

      nameInput.maxLength = config.maxNameChars;
      nameInput.placeholder = labels.itemNamePlaceholder;
      weightInput.min = String(config.minWeight);
      weightInput.max = String(config.maxWeight);

      if (config.image && config.image.src) {
        scaleImage.src = config.image.src;
        scaleImage.alt = config.image.alt || "";
        scaleImage.style.display = "";
      } else {
        scaleImage.removeAttribute("src");
        scaleImage.alt = "";
        scaleImage.style.display = "none";
      }
    }

    function hydrateFromSession() {
      if (!config.persistSession) {
        return;
      }
      try {
        var raw = sessionStorage.getItem("mbs-state");
        if (!raw) {
          return;
        }
        var parsed = JSON.parse(raw);
        if (!Array.isArray(parsed.items)) {
          return;
        }
        state.items = parsed.items.filter(isValidItem);
        if (parsed.titles && typeof parsed.titles === "object") {
          if (typeof parsed.titles.left === "string") {
            state.titles.left = clampTitle(parsed.titles.left);
          }
          if (typeof parsed.titles.right === "string") {
            state.titles.right = clampTitle(parsed.titles.right);
          }
        }
      } catch (err) {
        state.items = [];
      }
    }

    function persist() {
      if (!config.persistSession) {
        return;
      }
      sessionStorage.setItem(
        "mbs-state",
        JSON.stringify({ items: state.items, titles: state.titles })
      );
    }

    function addItem() {
      var name = String(nameInput.value || "").trim();
      var weight = Number(weightInput.value);

      if (!name) {
        announce(labels.errorNameRequired, true);
        return;
      }
      if (name.length > config.maxNameChars) {
        announce(format(labels.errorNameTooLong, { maxNameChars: config.maxNameChars }), true);
        return;
      }
      if (!Number.isInteger(weight) || weight < config.minWeight || weight > config.maxWeight) {
        announce(
          format(labels.errorWeightRange, { minWeight: config.minWeight, maxWeight: config.maxWeight }),
          true
        );
        return;
      }
      if (state.items.length >= config.maxItems) {
        announce(format(labels.errorMaxItems, { maxItems: config.maxItems }), true);
        return;
      }

      var item = {
        id: "mbs-item-" + Date.now() + "-" + Math.floor(Math.random() * 10000),
        name: name,
        weight: weight,
        zone: "left"
      };
      state.items.push(item);
      persist();
      render();
      form.reset();
      nameInput.focus();
      weightInput.value = String(Math.min(5, config.maxWeight));
      announce(format(labels.statusAdded, { name: item.name, weight: item.weight }), false);
    }

    function moveItem(itemId, zoneName) {
      if (!config.showDepot && zoneName === "depot") {
        return;
      }
      var item = state.items.find(function (entry) {
        return entry.id === itemId;
      });
      if (!item || !zoneByName[zoneName]) {
        return;
      }
      item.zone = zoneName;
      persist();
      render();
      var zoneLabel =
        zoneName === "left" ? labels.zoneLeft : zoneName === "right" ? labels.zoneRight : labels.zoneDepot;
      announce(format(labels.statusMoved, { name: item.name, zoneLabel: zoneLabel }), false);
    }

    function render() {
      clearZone(leftZone);
      clearZone(rightZone);
      if (config.showDepot) {
        clearZone(depotZone);
      }

      state.items.forEach(function (item) {
        var card = buildItemCard(item);
        zoneByName[item.zone].appendChild(card);
      });

      var leftWeight = totalFor("left");
      var rightWeight = totalFor("right");
      panTotalLeftEl.textContent = String(leftWeight);
      panTotalRightEl.textContent = String(rightWeight);

      var delta = rightWeight - leftWeight;
      var tilt = prefersReducedMotion ? 0 : clamp(delta * config.tiltFactor, -config.maxTiltDeg, config.maxTiltDeg);
      beamBar.style.transform = "rotate(" + tilt + "deg)";
    }

    function clearZone(zone) {
      zone.querySelectorAll(".mbs-chip").forEach(function (chip) {
        chip.remove();
      });
    }

    function buildItemCard(item) {
      var card = document.createElement("article");
      card.className = "mbs-chip";
      card.draggable = true;
      card.dataset.itemId = item.id;

      card.innerHTML =
        '<div class="mbs-chip-header">' +
        '<span class="mbs-chip-name"></span>' +
        '<span class="mbs-chip-weight"></span>' +
        "</div>" +
        '<div class="mbs-chip-actions">' +
        '<button type="button" data-move-zone="left"></button>' +
        '<button type="button" data-move-zone="right"></button>' +
        '<button type="button" data-move-zone="depot"></button>' +
        "</div>";

      card.querySelector(".mbs-chip-name").textContent = item.name;
      card.querySelector(".mbs-chip-weight").textContent = String(item.weight);

      card.addEventListener("dragstart", function () {
        state.draggingId = item.id;
        card.classList.add("dragging");
      });
      card.addEventListener("dragend", function () {
        state.draggingId = null;
        card.classList.remove("dragging");
        clearDropzoneHighlights();
      });

      card.addEventListener("pointerdown", function (event) {
        if (event.pointerType === "mouse" || event.target.tagName === "BUTTON") {
          return;
        }
        state.pointerDragId = item.id;
        state.pointerActive = false;
        state.pointerStartX = event.clientX;
        state.pointerStartY = event.clientY;
        if (card.setPointerCapture) {
          try {
            card.setPointerCapture(event.pointerId);
          } catch (err) {
            /* ignore */
          }
        }
      });

      card.querySelectorAll("[data-move-zone]").forEach(function (button) {
        var zone = button.dataset.moveZone;
        if (zone === "depot" && !config.showDepot) {
          button.hidden = true;
          return;
        }
        if (zone === "left") {
          button.textContent = labels.moveLeft;
        } else if (zone === "right") {
          button.textContent = labels.moveRight;
        } else {
          button.textContent = labels.moveDepot;
        }
        button.disabled = item.zone === zone;
        button.addEventListener("click", function () {
          moveItem(item.id, zone);
        });
      });

      return card;
    }

    function totalFor(zoneName) {
      return state.items.reduce(function (sum, item) {
        return item.zone === zoneName ? sum + item.weight : sum;
      }, 0);
    }

    function detectZoneAt(clientX, clientY) {
      var el = document.elementFromPoint(clientX, clientY);
      if (!el) {
        return null;
      }
      var zone = el.closest(".mbs-dropzone");
      if (!zone) {
        return null;
      }
      if (!config.showDepot && zone.dataset.zone === "depot") {
        return null;
      }
      return zone;
    }

    function highlightDropzoneAt(clientX, clientY) {
      clearDropzoneHighlights();
      var zone = detectZoneAt(clientX, clientY);
      if (zone) {
        zone.classList.add("mbs-over");
      }
    }

    function clearDropzoneHighlights() {
      dropZones.forEach(function (zone) {
        zone.classList.remove("mbs-over");
      });
    }

    function announce(message, isError) {
      statusEl.textContent = message;
      statusEl.classList.toggle("mbs-error", !!isError);
    }

    function format(text, values) {
      return text.replace(/\{(\w+)\}/g, function (_, key) {
        return Object.prototype.hasOwnProperty.call(values, key) ? String(values[key]) : "";
      });
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function clampTitle(text) {
      return String(text || "").trim().slice(0, config.maxTitleChars);
    }

    function applyPanTitlesToDom() {
      panTitleLeftEl.textContent = state.titles.left;
      panTitleRightEl.textContent = state.titles.right;
    }

    function focusPanTitle(el) {
      el.focus();
      var range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
      var selection = window.getSelection();
      if (selection) {
        selection.removeAllRanges();
        selection.addRange(range);
      }
    }

    function wirePanTitles() {
      [
        { side: "left", el: panTitleLeftEl },
        { side: "right", el: panTitleRightEl }
      ].forEach(function (entry) {
        var side = entry.side;
        var el = entry.el;
        var wrap = el.closest(".mbs-pan-title-wrap");
        var pencil = wrap.querySelector(".mbs-pan-title-pencil");
        var editSnapshot = "";

        pencil.addEventListener("click", function () {
          focusPanTitle(el);
        });

        el.addEventListener("focus", function () {
          editSnapshot = state.titles[side];
        });

        el.addEventListener("input", function () {
          var text = el.textContent || "";
          if (text.length > config.maxTitleChars) {
            el.textContent = text.slice(0, config.maxTitleChars);
            focusPanTitle(el);
          }
        });

        el.addEventListener("paste", function (event) {
          event.preventDefault();
          var pasted = (event.clipboardData || window.clipboardData).getData("text/plain");
          var current = el.textContent || "";
          var selection = window.getSelection();
          if (!selection || selection.rangeCount === 0) {
            return;
          }
          var range = selection.getRangeAt(0);
          range.deleteContents();
          range.insertNode(document.createTextNode(pasted));
          range.collapse(false);
          selection.removeAllRanges();
          selection.addRange(range);
          var combined = el.textContent || "";
          if (combined.length > config.maxTitleChars) {
            el.textContent = combined.slice(0, config.maxTitleChars);
            focusPanTitle(el);
          }
        });

        el.addEventListener("keydown", function (event) {
          if (event.key === "Enter") {
            event.preventDefault();
            el.blur();
          } else if (event.key === "Escape") {
            event.preventDefault();
            state.titles[side] = editSnapshot;
            el.textContent = editSnapshot;
            el.blur();
          }
        });

        el.addEventListener("blur", function () {
          var next = clampTitle(el.textContent);
          state.titles[side] = next;
          el.textContent = next;
          if (next !== editSnapshot) {
            persist();
          }
        });
      });
    }

    function isValidItem(item) {
      return (
        item &&
        typeof item.id === "string" &&
        typeof item.name === "string" &&
        Number.isInteger(item.weight) &&
        ["left", "right", "depot"].indexOf(item.zone) > -1
      );
    }
  })();
</script>
