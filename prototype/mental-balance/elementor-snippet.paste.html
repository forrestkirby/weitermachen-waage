<section id="mbs-root" class="mbs-app" data-mbs-ready="false">
  <div class="mbs-header">
    <h2 class="mbs-title">Mentale Waage</h2>
    <p class="mbs-help">Fuege bis zu 10 Elemente hinzu und verschiebe sie zwischen links, rechts und Ablage.</p>
  </div>
  <form class="mbs-add-form" novalidate>
    <label class="mbs-label"><span class="mbs-label-text">Bezeichnung</span><input class="mbs-input-name" name="itemName" type="text" maxlength="40" placeholder="z. B. Pruefungsangst" required /></label>
    <label class="mbs-label"><span class="mbs-label-text">Gewicht (1-10)</span><input class="mbs-input-weight" name="itemWeight" type="number" min="1" max="10" step="1" value="5" required /></label>
    <button class="mbs-add-btn" type="submit">Element hinzufuegen</button>
  </form>
  <div class="mbs-scale-area">
    <img class="mbs-scale-image" alt="" />
    <div class="mbs-beam-wrap"><div class="mbs-beam"><div class="mbs-pan mbs-dropzone mbs-left-pan" data-zone="left"></div><div class="mbs-pan mbs-dropzone mbs-right-pan" data-zone="right"></div></div></div>
  </div>
  <div class="mbs-depot-area"><h3 class="mbs-zone-title">Ablage</h3><div class="mbs-dropzone mbs-depot" data-zone="depot"></div></div>
  <div class="mbs-actions"><button class="mbs-clear-btn" type="button">Alles loeschen</button><p class="mbs-totals">Links: <span data-mbs-total="left">0</span> | Rechts: <span data-mbs-total="right">0</span></p></div>
  <p class="mbs-status" role="status" aria-live="polite"></p>
  <div class="mbs-drag-ghost" aria-hidden="true"></div>
</section>
