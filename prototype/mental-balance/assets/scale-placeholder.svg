<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Waage Platzhalter">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eef4ff" />
      <stop offset="100%" stop-color="#dbe7ff" />
    </linearGradient>
  </defs>
  <rect width="1200" height="320" fill="url(#bg)" />
  <!-- Stand / fulcrum -->
  <g fill="none" stroke="#3f4f73" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <path d="M600 95 L560 250 L640 250 Z" fill="#e8eef8" stroke="#3f4f73" />
    <line x1="600" y1="95" x2="600" y2="55" />
  </g>
  <!-- Beam (static sketch; live tilt is CSS on .mbs-beam-bar) -->
  <line x1="120" y1="55" x2="1080" y2="55" stroke="#4a5a78" stroke-width="8" stroke-linecap="round" />
  <!-- Pan chains -->
  <g fill="none" stroke="#6d84be" stroke-width="5" stroke-linecap="round">
    <line x1="220" y1="55" x2="220" y2="120" />
    <line x1="980" y1="55" x2="980" y2="120" />
  </g>
  <!-- Pan bowls (visual reference only) -->
  <g fill="#f8fbff" stroke="#6d84be" stroke-width="6">
    <ellipse cx="220" cy="155" rx="100" ry="28" />
    <ellipse cx="980" cy="155" rx="100" ry="28" />
  </g>
  <text x="600" y="295" text-anchor="middle" font-size="24" fill="#64748b" font-family="Segoe UI, Arial, sans-serif">
    Waage-Platzhalter (in WordPress hochladen)
  </text>
</svg>
